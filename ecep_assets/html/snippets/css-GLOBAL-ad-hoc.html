{% load sekizai_tags %}

{% comment %}
Many <link>s is faster than one <link> with many '@import's.
{% endcomment %}

{% addtoblock "css" %}

<!-- Ad Hoc Styles: Core-CMS Fixes & Features -->
<style>
    @import url("https://cdn.jsdelivr.net/gh/TACC/Core-Styles@v2.57.0-rc1/dist/elements/headings--cms.css") layer(base);
    @import url("https://cdn.jsdelivr.net/gh/TACC/Core-CMS-Custom@main/generic_assets/css/core-cms-fixes.css") layer(base);
    @import url("https://cdn.jsdelivr.net/gh/TACC/Core-CMS-Custom@e7e4bf18/generic_assets/css/hide-news-main-image.css") layer(base);
</style>

{% with CDN_URL="https://cdn.jsdelivr.net/gh/TACC/Core-CMS-Custom@166ca8df/ecep_assets/css" %}

<!-- Ad Hoc Styles: (SETTINGS) Colors & Fonts -->
<link href="{{CDN_URL}}/ecep-branding.css" rel="stylesheet" />
<link href="{{CDN_URL}}/colors--accent-auto.css" rel="stylesheet" />
<link href="{{CDN_URL}}/colors--accent-user.min.css" rel="stylesheet" />
<link href="{{CDN_URL}}/colors--header.css" rel="stylesheet" />
<link href="{{CDN_URL}}/fonts.css" rel="stylesheet" />

<!-- Ad Hoc Styles: (GENERICS) HTML Elements -->
<link href="{{CDN_URL}}/html-elements.css" rel="stylesheet" />

<!-- Ad Hoc Styles: (COMPONENTS) Header & Footer -->
<link href="{{CDN_URL}}/header.css" rel="stylesheet" />
<link href="{{CDN_URL}}/sections.css" rel="stylesheet" />

<!-- Ad Hoc Styles: (COMPONENTS) News -->
<link href="{{CDN_URL}}/adjust-news-feed-layout.css" rel="stylesheet" />
<link href="{{CDN_URL}}/hide-news-byline.css" rel="stylesheet" />

<!-- Ad Hoc Styles: (MISC.) Buttons & Links -->
<link href="{{CDN_URL}}/bootstrap/btn-center.css" rel="stylesheet" />
<link href="{{CDN_URL}}/fix-button-height.css" rel="stylesheet" />
<link href="{{CDN_URL}}/links.css" rel="stylesheet" />

{% endwith %}

{% endaddtoblock %}
